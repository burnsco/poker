services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app/frontend
    command: sh -lc "bun install && bun run dev"
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_URL: http://localhost:4000
      VITE_BACKEND_WS_URL: ws://localhost:4000/socket
    volumes:
      - .:/app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: dev
    working_dir: /app/backend
    command: sh -lc "mix deps.get && mix phx.server"
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      PHX_SERVER: "true"
    volumes:
      - .:/app
      - backend_deps:/app/backend/deps
      - backend_build:/app/backend/_build
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  backend_deps:
  backend_build:
