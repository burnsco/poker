services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /app
    command: sh -lc "bun install && bun run dev"
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_URL: http://localhost:4000
      VITE_BACKEND_WS_URL: ws://localhost:4000/socket
    volumes:
      - ./frontend:/app
      - ./frontend/node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    working_dir: /app
    command: sh -lc "mix deps.get && mix phx.server"
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      PHX_SERVER: "true"
    volumes:
      - ./backend:/app
      - backend_deps:/app/deps
      - backend_build:/app/_build
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  backend_deps:
  backend_build:
