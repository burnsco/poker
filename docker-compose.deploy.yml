services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: prod
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:4000}
        VITE_BACKEND_WS_URL: ${VITE_BACKEND_WS_URL:-ws://localhost:4000/socket}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: prod
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: ${PHX_HOST:-localhost}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: always
